name: Markdown Lint

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'
      - '.markdownlint.json'
  pull_request:
    branches: [ main ]
    paths:
      - '**.md'
  workflow_dispatch:  # Allow manual trigger

jobs:
  lint:
    name: Lint Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for markdownlint-cli2)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: |
          markdownlint-cli2 "**/*.md" \
            --config .markdownlint.json \
            --ignore node_modules \
            --ignore CHANGELOG.md \
            --ignore LICENSE

      - name: Annotate Linting Results (Optional)
        if: failure()
        run: |
          echo "::error::Markdown linting failed. Please fix the issues above."
