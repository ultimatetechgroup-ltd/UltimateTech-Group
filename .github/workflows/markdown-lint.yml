name: Markdown Lint

on:
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint.json'
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '.markdownlint.json'

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: .markdownlint.json