  # ----------------------------------------------
  #  SECURITY TOOLING – Markdown Lint (CI/CD)
  # ----------------------------------------------
  markdown-lint:
    image: ghcr.io/igorshubovych/markdownlint-cli:latest
    profiles: ["tools", "ci"]
    working_dir: /workdir
    volumes:
      - ./:/workdir
    command: ["--config", ".markdownlint.json", "**/*.md", "--ignore", "node_modules", "--ignore", "CHANGELOG.md"]

