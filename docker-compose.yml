# ----------------------------------------------
# NETWORKS
# ----------------------------------------------
networks:
  ultimate_backend:
    driver: bridge
    internal: true  # Prevents external access except via reverse proxy

# ----------------------------------------------
# SECRETS (Example – DO NOT COMMIT REAL VALUES)
# ----------------------------------------------
secrets:
  webtrader_db_password:
    file: ./secrets/db_password.txt  # Ensure this is in .gitignore

